<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Mad Inventor Lab — Hi-Fi (Direction C)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800;9..144,900&family=Nunito:wght@500;600;700;800;900&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFE9C4; --bg-2:#FFD089; --paper:#FFFBEF;
  --ink:#1F1A2A; --ink-soft:#6A6275;
  --primary:#3CC4DA; --primary-deep:#1F88A0;
  --gold:#FFC93C; --gold-deep:#D89C0A;
  --plum:#B970D2; --rose:#FF6F61; --sage:#7DD66F;
  --line:#1F1A2A;

  --r-sm:14px; --r-md:20px; --r-lg:28px; --r-xl:36px;
  --shadow-1: 0 3px 0 rgba(31,26,42,.18);
  --shadow-2: 0 5px 0 var(--ink);
  --shadow-card: 0 4px 0 rgba(31,26,42,.14);
}
[data-art="watercolor"]{
  --bg:#FFF6E5; --bg-2:#FFE6B0; --paper:#FFFBF1;
  --primary:#7AB6D9; --primary-deep:#3A6D94;
  --gold:#F6C453; --gold-deep:#E0A12C;
  --plum:#A26FB6; --rose:#E76F51; --sage:#8FB979;
}
[data-art="ink"]{
  --bg:#FBF6E8; --bg-2:#F0E5C8; --paper:#FFFDF6;
  --primary:#3FA7C4; --primary-deep:#1F5E73;
  --gold:#F2B33A; --gold-deep:#B07F0E;
  --plum:#7A4FA8; --rose:#D24E32; --sage:#6FA259;
}
[data-art="cel"]{
  --bg:#FFE9C4; --bg-2:#FFD089; --paper:#FFFBEF;
  --primary:#3CC4DA; --primary-deep:#1F88A0;
  --gold:#FFC93C; --gold-deep:#D89C0A;
  --plum:#B970D2; --rose:#FF6F61; --sage:#7DD66F;
}

*{box-sizing:border-box}
html,body{margin:0;background:#E9DFC2;color:var(--ink);font-family:'Nunito',system-ui,sans-serif;font-weight:600;-webkit-font-smoothing:antialiased;}
button{font:inherit;color:inherit;border:none;background:none;cursor:pointer;font-weight:800;}

.app-bg{
  min-height:100vh;
  background:
    radial-gradient(60vh 50vh at 80% 10%, rgba(60,196,218,0.30), transparent 60%),
    radial-gradient(70vh 60vh at 10% 90%, rgba(255,201,60,0.32), transparent 60%),
    radial-gradient(50vh 50vh at 90% 90%, rgba(185,112,210,0.20), transparent 60%),
    var(--bg);
  display:flex;align-items:flex-start;justify-content:center;
  padding:48px 24px 96px;gap:36px;flex-wrap:wrap;
}

/* ======== Phone shell ======== */
.phone{
  width:390px;height:820px;background:var(--paper);
  border:2.5px solid var(--line);border-radius:48px;
  box-shadow: 0 12px 0 rgba(31,26,42,.10), 0 36px 60px rgba(31,26,42,.18);
  position:relative;overflow:hidden;display:flex;flex-direction:column;
}
.phone::before{
  content:'';position:absolute;top:14px;left:50%;transform:translateX(-50%);
  width:120px;height:30px;background:var(--ink);border-radius:18px;z-index:30;
}
.status{
  position:absolute;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px 0;font-family:'Nunito';font-weight:800;font-size:15px;color:var(--ink);z-index:20;
}
.status .right{display:flex;gap:6px;align-items:center;font-size:13px;}

/* ======== Layout system: nav, content, action ======== */
.nav{
  position:relative;z-index:5;
  padding: 60px 24px 8px; display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.nav-title{display:flex;flex-direction:column;gap:2px;}
.nav-title .eyebrow{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:800;}
.nav-title h1{font-family:'Fraunces';font-weight:900;font-size:26px;letter-spacing:-0.02em;margin:0;line-height:1;}
.icon-btn{
  width:44px;height:44px;border-radius:50%;background:var(--paper);
  border:2.5px solid var(--line);display:inline-flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-card);
}

.content{
  position:relative;flex:1;display:flex;flex-direction:column;gap:16px;
  padding: 8px 24px 24px;overflow:hidden;
}
.content.has-tabbar{padding-bottom: 100px;}

.action{
  position:relative;display:flex;flex-direction:column;gap:10px;
}

/* ======== Tab bar (bottom nav) ======== */
.tabbar{
  position:absolute;left:18px;right:18px;bottom:18px;height:72px;background:var(--paper);
  border:2.5px solid var(--line);border-radius:30px;display:flex;align-items:center;justify-content:space-around;
  box-shadow:0 8px 0 rgba(31,26,42,.10);z-index:5;padding: 0 8px;
}
.tab{
  width:54px;height:54px;border-radius:18px;display:flex;align-items:center;justify-content:center;
  color:var(--ink-soft);font-weight:900;font-size:22px;
}
.tab.active{background:var(--gold);color:var(--ink);box-shadow:inset 0 -4px 0 rgba(0,0,0,.18);}

/* ======== Typography ======== */
h1,h2,h3{font-family:'Fraunces',serif;font-weight:900;letter-spacing:-0.01em;margin:0;color:var(--ink)}
.eyebrow{font-family:'Nunito';font-weight:800;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-soft)}
.script{font-family:'Caveat',cursive;font-weight:700}
.h-quote{font-family:'Fraunces';font-weight:800;font-size:20px;line-height:1.15;letter-spacing:-0.01em;}

/* ======== Cards & chips ======== */
.card{
  background:var(--paper);border:2.5px solid var(--line);border-radius:var(--r-md);
  padding:16px;box-shadow:var(--shadow-card);
}
.card.hero{background:var(--bg-2);}
.card.gold{background:var(--gold);}
.card.dark{background:var(--ink);color:var(--paper);border-color:var(--line);}
.card.dark .eyebrow{color:rgba(255,251,239,.7);}

.chip{
  display:inline-flex;align-items:center;gap:6px;border:2px solid var(--line);border-radius:999px;
  padding:6px 12px;background:var(--paper);font-size:13px;font-weight:800;line-height:1;
  white-space:nowrap;flex-shrink:0;
}
.btn{white-space:nowrap;}
.chip.gold{background:var(--gold)}
.chip.plum{background:var(--plum);color:#fff}
.chip.dark{background:var(--ink);color:var(--gold)}
.chip.lg{padding:8px 14px;font-size:14px;}

/* ======== Buttons (≥56px height for kid hit targets) ======== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  border:2.5px solid var(--line);border-radius:999px;
  min-height:56px;padding:12px 24px;
  background:var(--gold);font-family:'Nunito';font-weight:900;font-size:17px;letter-spacing:-0.01em;
  box-shadow:var(--shadow-2);transition: transform .12s ease, box-shadow .12s ease;
}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--ink)}
.btn.primary{background:var(--rose);color:#fff;}
.btn.ghost{background:var(--paper);}
.btn.big{min-height:64px;padding:16px 28px;font-size:19px;border-radius:32px;}

/* ======== Layout helpers ======== */
.row{display:flex;gap:10px;align-items:center}
.between{justify-content:space-between}
.col{display:flex;flex-direction:column;gap:10px}
.grow{flex:1}

/* ======== The pneumatic tube — only on Workshop, Arrival, Reaction, Daily ======== */
.tube{position:absolute;top:0;bottom:0;right:14px;width:24px;z-index:1;pointer-events:none;}
.tube::before{
  content:'';position:absolute;inset:0;border:2.5px solid var(--line);border-radius:14px;
  background: repeating-linear-gradient(180deg, var(--primary) 0 14px, var(--primary-deep) 14px 18px);
  box-shadow: inset 2px 0 0 rgba(255,255,255,.30), inset -2px 0 0 rgba(0,0,0,.20);
}
.tube .ring{position:absolute;left:-5px;right:-5px;height:7px;border:2px solid var(--line);border-radius:5px;background:var(--ink);}

.tube-pop{
  position:absolute;right:8px;top:60px;width:38px;height:38px;background:var(--gold);
  border:2.5px solid var(--line);border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:900;animation: tubedrop 2.6s ease-in-out infinite;z-index:6;font-size:18px;
}
@keyframes tubedrop {
  0%,15% {transform: translateY(-50px) scale(.8); opacity:0}
  35% {transform: translateY(0) scale(1); opacity:1}
  70% {transform: translateY(8px) scale(.96); opacity:1}
  100% {transform: translateY(72px) scale(.9); opacity:0}
}

/* ======== Orbit (3D tilted) ======== */
.orbit-stage{
  position:relative;flex:1;display:flex;align-items:center;justify-content:center;
  perspective:900px;min-height:240px;
}
.orbit{position:relative;width:280px;height:280px;border-radius:50%;transform: rotateX(56deg);transform-style:preserve-3d;}
.orbit .ring{position:absolute;inset:0;border-radius:50%;border:2px dashed var(--ink);opacity:.40;}
.orbit .floor{position:absolute;inset:8%;border-radius:50%;background: radial-gradient(closest-side, rgba(255,255,255,.7), rgba(255,255,255,0));}
.orbit-spin{position:absolute;inset:0;animation: spin 32s linear infinite;}
@keyframes spin { to { transform: rotateZ(360deg); } }
.part{
  position:absolute;left:50%;top:50%;width:54px;height:54px;margin:-27px 0 0 -27px;
  background:var(--paper);border:2.5px solid var(--line);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 0 rgba(31,26,42,.20);
  transform-style:preserve-3d;
}
.part.sel{background:var(--gold);}
.part.lock{opacity:.55;background:repeating-linear-gradient(45deg, var(--paper) 0 4px, var(--bg-2) 4px 8px);}
.part .upright{transform: rotateX(-56deg);display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
.contraption-center{position:absolute;left:50%;top:50%;transform: translate(-50%,-50%) rotateX(-56deg);width:120px;height:120px;display:flex;align-items:center;justify-content:center;}

/* ======== Speech bubble ======== */
.bubble{
  position:relative;background:var(--paper);border:2.5px solid var(--line);border-radius:24px;
  padding:14px 18px;box-shadow:var(--shadow-card);
  font-family:'Fraunces';font-weight:800;font-size:19px;line-height:1.2;
}
.bubble::after{
  content:'';position:absolute;left:32px;bottom:-12px;width:18px;height:18px;
  background:var(--paper);border-right:2.5px solid var(--line);border-bottom:2.5px solid var(--line);transform:rotate(45deg);
}

/* ======== SFX visual notes ======== */
.sfx{position:absolute;font-family:'Caveat';font-weight:700;font-size:24px;color:var(--rose);pointer-events:none;text-shadow: 1.5px 1.5px 0 var(--paper);}
.sfx.cool{color:var(--primary-deep)}
.sfx.warm{color:var(--gold-deep)}

/* ======== Test boom ======== */
.boom{position:absolute;inset:0;pointer-events:none;}
.spark{
  position:absolute;width:14px;height:14px;background:var(--gold);border:2px solid var(--line);border-radius:3px;
  animation: sparkfly 1.6s ease-out infinite;
}
@keyframes sparkfly { 0%{transform:translate(0,0) rotate(0);opacity:1} 100%{transform: translate(var(--dx),var(--dy)) rotate(720deg); opacity:0} }
.shake{animation: shake .9s ease-in-out infinite;}
@keyframes shake { 0%,100%{transform:translate(0,0)} 20%{transform:translate(-3px,2px)} 40%{transform:translate(3px,-2px)} 60%{transform:translate(-2px,-2px)} 80%{transform:translate(2px,2px)} }

/* ======== Flipbook ======== */
.book{display:flex;width:100%;flex:1;perspective:1400px;gap:0;overflow:hidden;border-radius:var(--r-md);}
.page{
  flex:1;min-width:0;background:var(--paper);border:2.5px solid var(--line);box-shadow:var(--shadow-card);
  padding:14px;display:flex;flex-direction:column;gap:8px;
}
.page.left{border-radius:var(--r-md) 0 0 var(--r-md);transform: rotateY(-3deg);transform-origin:right center;}
.page.right{border-radius:0 var(--r-md) var(--r-md) 0;transform: rotateY(3deg);transform-origin:left center;}

/* ======== Hatched placeholder ======== */
.placeholder{
  background: repeating-linear-gradient(45deg, var(--paper) 0 8px, var(--bg-2) 8px 9px);
  border:2px dashed var(--line);border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-family:'Caveat';color:var(--ink-soft);font-size:18px;
}

/* ======== Daily glow ======== */
.daily-card{
  background:linear-gradient(160deg, var(--ink) 0%, #2D2542 100%); color:var(--paper);
  border:2.5px solid var(--line);border-radius:var(--r-lg);padding:20px;position:relative;overflow:hidden;
  box-shadow: 0 0 0 4px rgba(255,201,60,.30), 0 8px 0 rgba(31,26,42,.20);
}
.daily-card .eyebrow{color:rgba(255,251,239,.7);}
.daily-card::before{content:'';position:absolute;inset:-30%;background:radial-gradient(closest-side, rgba(255,201,60,.45), transparent 60%);animation: pulse 3.4s ease-in-out infinite;}
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.9} }
.spark-bg{position:absolute;inset:0;pointer-events:none;}
.spark-bg span{position:absolute;width:6px;height:6px;background:var(--gold);border-radius:50%;box-shadow:0 0 8px var(--gold);animation:twinkle 2.4s ease-in-out infinite;}
@keyframes twinkle { 0%,100%{opacity:.2;transform:scale(.7)} 50%{opacity:1;transform:scale(1.2)} }

/* ======== Reduced motion ======== */
@media (prefers-reduced-motion: reduce){ *,*::before,*::after{animation-duration:0.001ms!important;animation-iteration-count:1!important;transition-duration:0.001ms!important} }
.reduced-motion *,.reduced-motion *::before,.reduced-motion *::after{animation:none!important;transition:none!important;}

/* ======== Header chrome ======== */
.back-link{
  position:fixed;top:18px;left:18px;background:var(--paper);border:2.5px solid var(--line);border-radius:999px;
  padding:10px 16px;font-weight:800;font-size:14px;text-decoration:none;color:var(--ink);
  box-shadow:0 4px 0 rgba(0,0,0,.18);z-index:50;
}
.title-strip{
  width:100%;display:flex;align-items:flex-end;justify-content:space-between;
  padding: 12px 32px 0 240px;color:var(--ink);
  font-family:'Fraunces';font-weight:900;font-size:26px;letter-spacing:-0.01em;
}
.title-strip .sub{font-family:'Nunito';font-weight:800;font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.14em;}
.title-strip .right-sub{text-align:right;line-height:1.4;}

/* ======== Caption under each phone ======== */
.cap{
  width:390px;text-align:center;margin-top:18px;
  font-family:'Fraunces';font-weight:800;font-size:17px;color:var(--ink);
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.cap .num{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--ink);color:var(--gold);border-radius:999px;
  padding:4px 12px;font-family:'Nunito';font-weight:900;font-size:12px;letter-spacing:.10em;
}
.frame-wrap{display:flex;flex-direction:column;align-items:center;}

/* ======== Test screen trait sensor cells ======== */
.judge{display:grid;grid-template-columns: repeat(4, 1fr);gap:8px;}
.judge-cell{
  background:var(--paper);border:2px solid var(--line);border-radius:14px;padding:10px 6px 8px;
  display:flex;flex-direction:column;align-items:center;gap:4px;font-size:12px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.06em;
}
.judge-cell.on{background:var(--gold);}
.judge-cell .glyph{font-size:22px;line-height:1;}
.judge-cell .dots{display:flex;gap:3px;margin-top:2px;}
.judge-cell .dots span{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--line);background:var(--paper);}
.judge-cell .dots span.on{background:var(--ink);}

/* ======== Trait fingerprint (4-dot scoreline) ======== */
.fingerprint{
  display:inline-flex;align-items:center;gap:8px;
  border:2px solid var(--line);border-radius:999px;padding:5px 10px;background:var(--paper);
  font-size:11px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;
}
.fingerprint .grp{display:inline-flex;align-items:center;gap:3px;}
.fingerprint .grp .lbl{margin-right:2px;color:var(--ink-soft);font-size:10px;}
.fingerprint .dot{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--line);background:var(--paper);}
.fingerprint .dot.on{background:var(--ink);}
.fingerprint.predict{border-style:dashed;background:transparent;}

/* Daily ribbon — week dots */
.week{display:flex;gap:6px;align-items:center;}
.week .pip{
  width:14px;height:14px;border-radius:50%;border:2px solid var(--line);background:var(--paper);
}
.week .pip.done{background:var(--ink-soft);}
.week .pip.today{background:var(--gold);box-shadow:0 0 0 3px rgba(255,201,60,.35);}
.week .lbl{font-size:11px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-soft);}
</style>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const { TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakToggle } = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "art": "cel",
  "reducedMotion": false,
  "showSfx": true,
  "explosion": "big"
}/*EDITMODE-END*/;

// ====================================================================
// Icons
// ====================================================================
const Ic = ({type,size=28})=>{
  const s=size,sw=2.4,stroke="#1F1A2A";
  const p={width:s,height:s,viewBox:"0 0 32 32",fill:"none",stroke,strokeWidth:sw,strokeLinecap:"round",strokeLinejoin:"round"};
  switch(type){
    case 'cog': return (<svg {...p}>
      <circle cx="16" cy="16" r="6" fill="var(--gold)"/>
      {[0,45,90,135,180,225,270,315].map(a=>{const r1=8,r2=12,r=a*Math.PI/180;return <line key={a} x1={16+Math.cos(r)*r1} y1={16+Math.sin(r)*r1} x2={16+Math.cos(r)*r2} y2={16+Math.sin(r)*r2}/>})}
      <circle cx="16" cy="16" r="2" fill={stroke}/>
    </svg>);
    case 'spring': return (<svg {...p}><path d="M8 8 Q16 4 24 8 Q8 12 24 14 Q8 16 24 18 Q8 20 24 22 Q16 26 8 22"/></svg>);
    case 'beaker': return (<svg {...p}><path d="M11 6 H21 M12 6 V14 L7 24 Q7 27 10 27 H22 Q25 27 25 24 L20 14 V6" fill="var(--primary)"/></svg>);
    case 'bolt': return (<svg {...p}><path d="M17 4 L8 18 H15 L13 28 L23 13 H16 Z" fill="var(--gold)"/></svg>);
    case 'jelly': return (<svg {...p}><path d="M8 16 Q8 8 16 8 Q24 8 24 16 V22 Q24 26 20 26 Q19 24 16 26 Q13 24 12 26 Q8 26 8 22 Z" fill="var(--sage)"/><circle cx="13" cy="14" r="1.2" fill={stroke}/><circle cx="19" cy="14" r="1.2" fill={stroke}/></svg>);
    case 'sock': return (<svg {...p}><path d="M12 4 H20 V16 L26 22 V27 H10 V22 Z" fill="var(--rose)"/><path d="M12 8 H20"/></svg>);
    case 'bell': return (<svg {...p}><path d="M9 22 Q9 10 16 8 Q23 10 23 22 Z" fill="var(--gold)"/><path d="M7 22 H25"/><circle cx="16" cy="25" r="1.6" fill={stroke}/></svg>);
    case 'feather': return (<svg {...p}><path d="M6 26 Q14 24 20 18 Q26 12 24 6 Q14 8 10 16 Q8 22 6 26 Z" fill="var(--primary)"/><path d="M6 26 L20 12"/></svg>);
    case 'cloud': return (<svg {...p}><path d="M9 20 Q5 20 5 16 Q5 12 10 12 Q11 8 16 8 Q22 8 23 13 Q28 13 28 17 Q28 20 24 20 Z" fill="var(--primary)"/></svg>);
    case 'magnet': return (<svg {...p}><path d="M8 6 V18 Q8 24 16 24 Q24 24 24 18 V6 H20 V18 Q20 20 16 20 Q12 20 12 18 V6 Z" fill="var(--rose)"/><path d="M8 6 H12 M20 6 H24" stroke="#fff" strokeWidth="2"/></svg>);
    case 'eye': return (<svg {...p}><path d="M3 16 Q16 6 29 16 Q16 26 3 16 Z" fill="#fff"/><circle cx="16" cy="16" r="4" fill={stroke}/><circle cx="14" cy="14" r="1.2" fill="#fff"/></svg>);
    case 'scope': return (<svg {...p}><path d="M5 14 L20 14 L26 18 L20 22 L5 22 Z" fill="var(--primary)"/><path d="M9 14 V22 M14 14 V22"/></svg>);
    case 'star': return (<svg {...p}><path d="M16 4 L19 13 L29 13 L21 19 L24 28 L16 22 L8 28 L11 19 L3 13 L13 13 Z" fill="var(--gold)"/></svg>);

const Orbit = ({radius=120, parts, size=270, spin=true}) => (
  <div className="orbit" style={{width:size,height:size}}>
    <div className="ring"/>
    <div className="floor"/>
    <div className="orbit-spin" style={{animation: spin?'spin 32s linear infinite':'none'}}>
      {parts.map((p,i)=>{
        const a = (i/parts.length)*Math.PI*2 - Math.PI/2;
        const x = Math.cos(a)*radius, y = Math.sin(a)*radius;
        return (
          <div key={i} className={`part ${p.sel?'sel':''} ${p.lock?'lock':''}`} style={{transform:`translate(${x}px,${y}px) ${p.sel?'translateZ(8px)':''}`}}>
            <div className="upright"><Ic type={p.t} size={26}/></div>
          </div>
        );
      })}
    </div>
  </div>
);

const SCREENS = [
  {key:'workshop',num:'C1', label:'Workshop · main loop', Cmp: Workshop},
  {key:'arrival', num:'C2', label:'Customer arrival',     Cmp: Arrival},
  {key:'build',   num:'C3', label:'Build · pick parts',   Cmp: Build},
  {key:'test',    num:'C4', label:'Test reveal',          Cmp: Test},
  {key:'react',   num:'C5', label:'Reaction + unlock',    Cmp: Reaction},
  {key:'cat',     num:'C6', label:'Catalogue / Flipbook', Cmp: Flipbook},
  {key:'daily',   num:'C7', label:'Daily special',        Cmp: Daily},
];

function App(){
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <div className={tweaks.reducedMotion?'reduced-motion':''}>
      <div className="title-strip">
        <div>
          <div className="sub">Direction C · Pneumatic Tube</div>
          Mad Inventor Lab · hi-fi
        </div>
        <div className="sub right-sub">7 screens · ages 6–9<br/>iOS HIG · 56pt+ targets</div>
      </div>
      <div className="app-bg">
        {SCREENS.map(({key,num,label,Cmp})=>(
          <div key={key} className="frame-wrap" data-screen-label={`${num} ${label}`}>
            <Cmp tweaks={tweaks}/>
            <div className="cap"><span className="num">{num}</span>{label}</div>
          </div>
        ))}
      </div>
      <TweaksPanel title="Tweaks">
        <TweakSection title="Art direction">
          <TweakRadio
            value={tweaks.art}
            onChange={v=>setTweak('art',v)}
            options={[
              {value:'watercolor',label:'Watercolor'},
              {value:'ink',label:'Ink'},
              {value:'cel',label:'Cel'},
            ]}/>
        </TweakSection>
        <TweakSection title="Test moment">
          <TweakRadio
            value={tweaks.explosion}
            onChange={v=>setTweak('explosion',v)}
            options={[
              {value:'big',label:'Big & explosive'},
              {value:'small',label:'Quiet'},
            ]}/>
        </TweakSection>
        <TweakSection title="Sound notes">
          <TweakToggle value={tweaks.showSfx} onChange={v=>setTweak('showSfx',v)} label="Show SFX notes"/>
        </TweakSection>
        <TweakSection title="Accessibility">
          <TweakToggle value={tweaks.reducedMotion} onChange={v=>setTweak('reducedMotion',v)} label="Reduced motion"/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
